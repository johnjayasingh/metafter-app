name: metafter
description: "Metafter — Flutter app foundation."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.0.2

  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Networking
  http: ^1.1.2
  dio: ^5.4.0

  # AWS auth + realtime
  amazon_cognito_identity_dart_2: ^3.6.3
  mqtt_client: ^10.5.1
  crypto: ^3.0.3

  # Utilities
  intl: ^0.19.0
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.1
  file_picker: ^8.0.0+1
  path_provider: ^2.1.1
  permission_handler: ^12.0.1
  intl_phone_field: ^3.2.0
  image_picker: ^1.2.2
  video_player: ^2.11.1
  flutter_blue_plus: ^2.3.3
  lottie: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animation/
    - assets/logos/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#000000"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/app_icon.png"
